apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-service
  labels:
    app: orders-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-service
  template:
    metadata:
      labels:
        app: orders-service
    spec:
      containers:
        - name: orders-service
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/orders-service:latest
          ports:
            - containerPort: 8003

          env:
            - name: PRODUCTS_SERVICE_URL
              value: "http://products-service:8001"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8002"

          livenessProbe:
            httpGet:
              path: /live
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 3
            periodSeconds: 5

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"